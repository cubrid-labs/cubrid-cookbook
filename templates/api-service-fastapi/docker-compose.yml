version: "3.9"

services:
  cubrid:
    image: cubrid/cubrid:11.2
    container_name: cubrid-db
    ports:
      - "33000:33000"
    healthcheck:
      test: ["CMD-SHELL", "cubrid service status | grep -q 'Server is running'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  api:
    build: .
    container_name: fastapi-service
    env_file:
      - .env
    depends_on:
      cubrid:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
