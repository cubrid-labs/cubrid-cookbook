version: "3.8"

services:
  cubrid:
    image: cubrid/cubrid:11.2
    environment:
      CUBRID_DB: demodb
    ports:
      - "33000:33000"
    healthcheck:
      test: ["CMD", "csql", "-u", "dba", "demodb", "-c", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
